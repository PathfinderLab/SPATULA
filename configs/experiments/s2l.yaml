experiment:
  name: s2l
  align:
    method: s2l
    weight: 1.0
    temperature_init: 0.07
    learn_temperature: true
    soft_beta: 0.5            # 0 → vanilla CLIP, 1 → fully soft
    label_temp: 0.1
  gene_recon:
    method: barlow_std_mse
    weight: 1.0
  image_recon:
    method: mse
    weight: 1.0

  tx_self:
    weight: 0.5
    ema_momentum: 0.999
    enable_masked_jepa: true
